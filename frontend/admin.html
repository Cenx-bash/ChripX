      function renderUserRow(u) {
        return `
    <tr id="user-row-${u.id}">
      <td><div class="admin-user-cell">
        <div style="width:34px;height:34px;border-radius:50%;background:${avatarBg(u.name)};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.85rem;flex-shrink:0">${u.name[0]}</div>
        <div>
          <div class="admin-user-name">${u.name} ${u.verified ? '<span style="color:var(--accent)">✓</span>' : ""}</div>
          <div class="admin-user-handle">@${u.handle}</div>
        </div>
      </div></td>
      <td><span class="badge ${
        u.role === "admin" ? "badge-red"
        : u.role === "mod" ? "badge-purple"
        : "badge-blue"
      }">${u.role}</span></td>
      <td>${u.posts.toLocaleString()}</td>
      <td>${u.followers}</td>
      <td><span class="badge ${u.status === "active" ? "badge-green" : "badge-red"}">${u.status}</span></td>
      <td style="color:var(--text-muted);font-size:0.82rem">${u.joined}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="admin-action-btn view" onclick="viewUser(${u.id})">👁 View</button>
          ${
            u.status === "active" ?
              `<button class="admin-action-btn ban" onclick="banUser(${u.id})">🔒 Ban</button>`
            : `<button class="admin-action-btn unban" onclick="unbanUser(${u.id})">✓ Unban</button>`
          }
          ${u.role !== "admin" ? `<button class="admin-action-btn" style="color:var(--purple);border:1px solid rgba(168,85,247,0.3)" onclick="App.toast('Role changed (demo)','success')">👑 Role</button>` : ""}

      </td>
    </tr>`;
      }

      function showAdminPage(page, el) {

        const main = document.getElementById("admin-main");

          dashboard: renderDashboardPage,
          users: renderUsersPage,
          reports: renderReportsPage,
          simulator: renderSimulatorPage,
          analytics: renderAnalyticsPage,
          posts:
            () => `<div class="admin-page-title">📝 Post Moderation</div><div class="admin-page-sub">Review and moderate posts</div>
      <div class="admin-table-wrap"><div class="admin-table-header"><div class="admin-table-title">Recent Posts</div><span class="sim-badge">DEMO</span></div>
      <table class="admin-table"><thead><tr><th>Author</th><th>Content</th><th>Likes</th><th>Reports</th><th>Actions</th></tr></thead><tbody>
      ${Array.from({ length: 6 }, (_, i) => {
        const p = Simulator.generateFakePost();
        return `<tr><td>@${p.username}</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.84rem">${Utils.sanitize(p.content || "")}</td><td>${Utils.formatNum(p.sim_likes)}</td><td>${Math.random() > 0.8 ? "1" : "0"}</td><td><button class="admin-action-btn view" onclick="App.toast('Viewing post (demo)','info')">View</button> <button class="admin-action-btn ban" onclick="App.toast('Post removed (demo)','success')">Remove</button></td></tr>`;
      }).join("")}
      </tbody></table></div>`,
          bots: () => renderSimulatorPage(),
        };
        if (pages[page]) {
          main.innerHTML = pages[page]();
          if (page === "dashboard" || page === "analytics")
            setTimeout(initCharts, 100);
        }
      }

      function initCharts() {
        const chartDefaults = {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: "#8b8ba7", boxWidth: 12 } } },
          scales: {
            x: {
              grid: { color: "rgba(255,255,255,0.05)" },
              ticks: { color: "#555570" },
            },
            y: {
              grid: { color: "rgba(255,255,255,0.05)" },
              ticks: { color: "#555570" },
            },
          },
        };
        const labels7 = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        const randArr = (min, max, n = 7) =>
          Array.from({ length: n }, () => Utils.randomInt(min, max));

        const makeChart = (id, type, data, opts = {}) => {
          const el = document.getElementById(id);
          if (!el) return;
          new Chart(el, { type, data, options: { ...chartDefaults, ...opts } });
        };

        // User growth
        makeChart("userGrowthChart", "line", {
          labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul"],
          datasets: [
            {
              label: "Users",
              data: [120, 185, 240, 310, 410, 520, 680],
              borderColor: "#1DA8F2",
              backgroundColor: "rgba(29,168,242,0.1)",
              fill: true,
              tension: 0.4,
              pointRadius: 3,
            },
          ],
        });

        // Engagement
        makeChart("engagementChart", "bar", {
          labels: labels7,
          datasets: [
            {
              label: "Likes",
              data: randArr(200, 800),
              backgroundColor: "rgba(244,67,108,0.7)",
            },
            {
              label: "Reposts",
              data: randArr(50, 200),
              backgroundColor: "rgba(34,197,94,0.7)",
            },
          ],
        });

        // DAU
        makeChart("dauChart", "line", {
          labels: labels7,
          datasets: [
            {
              label: "DAU",
              data: randArr(3, 8),
              borderColor: "#a855f7",
              backgroundColor: "rgba(168,85,247,0.1)",
              fill: true,
              tension: 0.4,
            },
          ],
        });

        // Posts per day
        makeChart("postsChart", "bar", {
          labels: labels7,
          datasets: [
            {
              label: "Posts",
              data: randArr(20, 120),
              backgroundColor: "rgba(29,168,242,0.7)",
              borderRadius: 6,
            },
          ],
        });

        // Engagement rate
        makeChart("engRate", "line", {
          labels: labels7,
          datasets: [
            {
              label: "Eng. Rate %",
              data: randArr(3, 18),
              borderColor: "#22c55e",
              backgroundColor: "rgba(34,197,94,0.1)",
              fill: true,
              tension: 0.4,
            },
          ],
        });

        // Content types
        makeChart(
          "contentChart",
          "doughnut",
          {
            labels: ["Text", "Image", "Video", "GIF"],
            datasets: [
              {
                data: [55, 28, 12, 5],
                backgroundColor: ["#1DA8F2", "#a855f7", "#f4436c", "#f59e0b"],
                borderWidth: 0,
              },
            ],
          },
          { scales: {} },
        );
      }

      let simRunning = true;
      function toggleSimulator(btn) {
        simRunning = !simRunning;
        btn.textContent = simRunning ? "⏸ Pause" : "▶ Resume";
        document.getElementById("sim-status").innerHTML =
          simRunning ?
            '<div style="width:10px;height:10px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite"></div> Simulator Running'
          : '<div style="width:10px;height:10px;background:var(--text-muted);border-radius:50%"></div> Simulator Paused';
        App.toast(
          simRunning ? "Simulator resumed" : "Simulator paused",
          "info",
        );
      }

      function runBurst() {
        App.toast(
          "💥 Viral burst triggered! All posts getting a wave of engagement (demo)",
          "warning",
          4000,
        );
      }

      function addBot() {
        App.toast("New demo bot added (demo only)", "success");
      }

      function toggleBot(btn, name) {
        const isPaused = btn.textContent.includes("Resume");
        btn.textContent = isPaused ? "⏸ Pause" : "▶ Resume";
        btn.className = `admin-action-btn ${isPaused ? "ban" : "unban"}`;
        App.toast(`${name} ${isPaused ? "resumed" : "paused"} (demo)`, "info");
      }

      function banUser(id) {
        const u = ADMIN_USERS.find((x) => x.id === id);
        if (!u || u.role === "admin") {
          App.toast("Can't ban admin", "error");
          return;
        }
        if (!confirm(`Ban @${u.handle}? (demo only)`)) return;
        u.status = "banned";
        document.getElementById(`user-row-${id}`).outerHTML = renderUserRow(u);
        App.toast(`@${u.handle} banned (demo)`, "warning");
      }

      function unbanUser(id) {
        const u = ADMIN_USERS.find((x) => x.id === id);
        if (!u) return;
        u.status = "active";
        document.getElementById(`user-row-${id}`).outerHTML = renderUserRow(u);
        App.toast(`@${u.handle} unbanned (demo)`, "success");
      }

      function viewUser(id) {
        const u = ADMIN_USERS.find((x) => x.id === id);
        if (!u) return;
        const modal = document.createElement("div");
        modal.className = "modal-overlay";
        modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">👤 User Profile</div>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
          <div style="width:60px;height:60px;border-radius:50%;background:${avatarBg(u.name)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;font-weight:700">${u.name[0]}</div>
          <div>
            <div style="font-weight:800;font-size:1.1rem">${u.name} ${u.verified ? '<span style="color:var(--accent)">✓</span>' : ""}</div>
            <div style="color:var(--text-muted)">@${u.handle}</div>
          </div>
        </div>
        ${[
          ["Email", u.email],
          ["Role", u.role],
          ["Status", u.status],
          ["Posts", u.posts],
          ["Followers", u.followers + " (sim)"],
          ["Joined", u.joined],
        ]
          .map(
            ([k, v]) => `
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
            <span style="color:var(--text-muted);font-size:0.85rem">${k}</span>
            <span style="font-weight:600;font-size:0.85rem">${v}</span>
          </div>`,
          )
          .join("")}
        <div style="display:flex;gap:10px;margin-top:20px">
          <button class="btn btn-outline" onclick="window.open('profile.html?u=${u.handle}','_blank')">View Profile</button>
          ${
            u.status === "active" && u.role !== "admin" ?
              `<button class="btn btn-danger" onclick="banUser(${u.id});this.closest('.modal-overlay').remove()">🔒 Ban User</button>`
            : u.status === "banned" ?
              `<button class="btn" style="background:var(--green);color:#fff" onclick="unbanUser(${u.id});this.closest('.modal-overlay').remove()">✓ Unban</button>`
            : ""
          }
        </div>
      </div>
    </div>`;
        modal.onclick = (e) => {
          if (e.target === modal) modal.remove();
        };
        document.body.appendChild(modal);
      }

      function filterUsers(q) {
        ADMIN_USERS.forEach((u) => {
          const row = document.getElementById(`user-row-${u.id}`);
          if (row)
            row.style.display =
              (
                u.name.toLowerCase().includes(q.toLowerCase()) ||
                u.handle.includes(q.toLowerCase())
              ) ?
                ""
              : "none";
        });
      }
      function filterUserRole(role) {
        ADMIN_USERS.forEach((u) => {
          const row = document.getElementById(`user-row-${u.id}`);
          if (row) row.style.display = !role || u.role === role ? "" : "none";
        });
      }
      function filterUserStatus(status) {
        ADMIN_USERS.forEach((u) => {
          const row = document.getElementById(`user-row-${u.id}`);
          if (row)
            row.style.display = !status || u.status === status ? "" : "none";
        });
      }

      function avatarBg(name) {
        const colors = [
          "#1DA8F2",
          "#f4436c",
          "#22c55e",
          "#a855f7",
          "#f59e0b",
          "#06b6d4",
        ];
        return colors[(name?.charCodeAt(0) || 0) % colors.length];
      }
    </script>
  </body>
</html>
