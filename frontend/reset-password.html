<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — ChirpX</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="auth-page" data-page="reset">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="auth-logo">
          <div class="auth-logo-icon">🐦</div>
          <div class="auth-logo-name">ChirpX</div>
        </div>
        <h1 class="auth-headline">
          Create a new<br /><span class="accent">password</span>
        </h1>
        <div class="auth-demo-banner">
          ⚠️ Demo mode: paste the token from the forgot password page.
        </div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 28px">
          <div style="font-size: 2.5rem; margin-bottom: 10px">🔒</div>
          <div class="auth-card-title">Reset Password</div>
          <div class="auth-card-sub">
            Enter your reset token and a new password
          </div>
        </div>

        <div
          id="success-box"
          class="auth-success"
          style="display: none; margin-bottom: 14px"
        >
          <span>✓</span> <span></span>
        </div>
        <div
          id="error-box"
          class="auth-error"
          style="display: none; margin-bottom: 14px"
        >
          <span>⚠</span> <span></span>
        </div>

        <form id="reset-form" class="auth-form" novalidate>
          <div class="input-group">
            <label class="input-label" for="token">Reset Token</label>
            <div class="input-wrapper">
              <span class="input-icon">🔑</span>
              <input
                type="text"
                id="token"
                class="input-field"
                placeholder="Paste your reset token"
                required
              />
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="password">New Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="password"
                class="input-field"
                placeholder="Min. 8 characters"
                required
                minlength="8"
              />
            </div>
            <div class="password-strength">
              <div class="strength-bars">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
              </div>
              <div class="strength-label"></div>
            </div>
          </div>
          <div class="input-group">
            <label class="input-label" for="confirm-password"
              >Confirm Password</label
            >
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="confirm-password"
                class="input-field"
                placeholder="Repeat new password"
                required
              />
            </div>
          </div>
          <button type="submit" class="auth-submit-btn" id="submit-btn">
            Reset Password
          </button>
        </form>
        <div class="auth-switch" style="margin-top: 20px">
          Back to <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
    <div id="toast-container"></div>
    <script src="Js/app.js"></script>
    <script src="Js/auth.js"></script>
    <script>
      document
        .getElementById("password")
        ?.addEventListener("input", function () {
          const val = this.value;
          const bars = document.querySelectorAll(".strength-bar");
          let s = 0;
          if (val.length >= 8) s++;
          if (/[A-Z]/.test(val)) s++;
          if (/[0-9]/.test(val)) s++;
          if (/[^a-zA-Z0-9]/.test(val)) s++;
          const cls = ["", "weak", "medium", "medium", "strong"];
          bars.forEach(
            (b, i) => (b.className = `strength-bar ${i < s ? cls[s] : ""}`),
          );
          const lbl = document.querySelector(".strength-label");
          if (lbl)
            lbl.textContent =
              val ? ["", "Weak", "Fair", "Good", "Strong"][s] : "";
        });
    </script>
  </body>
</html>
